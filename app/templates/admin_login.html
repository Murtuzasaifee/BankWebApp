<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ app_name }} | Admin Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', path=theme_css) }}">
    <link rel="stylesheet" href="{{ url_for('static', path='css/admin_login.css') }}">
</head>

<body>
    <div class="admin-login-page">
        <div class="admin-login-card">

            <div class="admin-login-header">
                <div class="admin-login-logo">{{ app_name }}</div>
                <div class="admin-login-badge-wrapper">
                    <span class="admin-login-badge">
                        <i class="fas fa-shield-alt"></i> Admin Portal
                    </span>
                </div>
                <h2>Admin Sign In</h2>
                <p>Enter your admin credentials to continue</p>
            </div>

            {% if error %}
            <div class="error-banner">
                <i class="fas fa-exclamation-circle"></i>
                {{ error }}
            </div>
            {% endif %}

            <form action="/admin/login" method="post">
                <div class="form-group">
                    <label for="username">Username</label>
                    <div class="input-wrapper">
                        <i class="fas fa-user input-icon"></i>
                        <input type="text" id="username" name="username" placeholder="Admin username"
                            autocomplete="username" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="input-wrapper">
                        <i class="fas fa-lock input-icon"></i>
                        <input type="password" id="password" name="password" placeholder="Admin password"
                            autocomplete="current-password" required>
                    </div>
                </div>

                <button type="submit" class="btn-admin-login">
                    <i class="fas fa-sign-in-alt"></i> Sign In to Admin
                </button>
            </form>

            <a href="/" class="back-link">
                <i class="fas fa-arrow-left"></i> Back to {{ app_name }}
            </a>

        </div>
    </div>
</body>

</html>
