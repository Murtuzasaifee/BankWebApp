<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ app_name }} | Admin Login</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', path=theme_css) }}">
    <style>
        .admin-login-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--gradient-hero);
            padding: 24px;
        }

        .admin-login-card {
            background: var(--white);
            border-radius: 16px;
            padding: 48px 40px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
        }

        .admin-login-logo {
            font-family: 'Playfair Display', serif;
            font-size: 1.6rem;
            font-weight: 700;
            color: var(--primary);
            letter-spacing: 2px;
            text-align: center;
            margin-bottom: 6px;
        }

        .admin-login-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: var(--surface-light);
            color: var(--primary);
            font-size: 0.75rem;
            font-weight: 600;
            padding: 4px 12px;
            border-radius: 20px;
            margin-bottom: 32px;
        }

        .admin-login-header {
            text-align: center;
            margin-bottom: 32px;
        }

        .admin-login-header h2 {
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--text-dark);
            margin-bottom: 6px;
        }

        .admin-login-header p {
            font-size: 0.88rem;
            color: var(--text-muted);
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-dark);
            margin-bottom: 8px;
        }

        .form-group .input-wrapper {
            position: relative;
        }

        .form-group .input-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        .form-group input {
            width: 100%;
            padding: 12px 14px 12px 40px;
            border: 1.5px solid var(--surface-light);
            border-radius: 10px;
            font-size: 0.9rem;
            font-family: 'Inter', sans-serif;
            color: var(--text-dark);
            background: var(--light-bg);
            transition: border-color 0.2s, box-shadow 0.2s;
            outline: none;
        }

        .form-group input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(124, 58, 237, 0.1);
            background: var(--white);
        }

        .btn-admin-login {
            width: 100%;
            padding: 13px;
            background: var(--gradient-primary);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 0.95rem;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.2s;
            margin-top: 8px;
        }

        .btn-admin-login:hover {
            opacity: 0.92;
            transform: translateY(-1px);
        }

        .btn-admin-login:active {
            transform: translateY(0);
        }

        .error-banner {
            background: rgba(210, 45, 45, 0.08);
            border: 1px solid rgba(210, 45, 45, 0.3);
            border-radius: 8px;
            padding: 10px 14px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.85rem;
            color: var(--danger);
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 24px;
            font-size: 0.85rem;
            color: var(--text-muted);
            text-decoration: none;
            transition: color 0.2s;
        }

        .back-link:hover {
            color: var(--primary);
        }
    </style>
</head>

<body>
    <div class="admin-login-page">
        <div class="admin-login-card">

            <div class="admin-login-header">
                <div class="admin-login-logo">{{ app_name }}</div>
                <div style="display:flex; justify-content:center; margin-bottom:20px;">
                    <span class="admin-login-badge">
                        <i class="fas fa-shield-alt"></i> Admin Portal
                    </span>
                </div>
                <h2>Admin Sign In</h2>
                <p>Enter your admin credentials to continue</p>
            </div>

            {% if error %}
            <div class="error-banner">
                <i class="fas fa-exclamation-circle"></i>
                {{ error }}
            </div>
            {% endif %}

            <form action="/admin/login" method="post">
                <div class="form-group">
                    <label for="username">Username</label>
                    <div class="input-wrapper">
                        <i class="fas fa-user input-icon"></i>
                        <input type="text" id="username" name="username" placeholder="Admin username"
                            autocomplete="username" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="input-wrapper">
                        <i class="fas fa-lock input-icon"></i>
                        <input type="password" id="password" name="password" placeholder="Admin password"
                            autocomplete="current-password" required>
                    </div>
                </div>

                <button type="submit" class="btn-admin-login">
                    <i class="fas fa-sign-in-alt"></i> Sign In to Admin
                </button>
            </form>

            <a href="/" class="back-link">
                <i class="fas fa-arrow-left"></i> Back to {{ app_name }}
            </a>

        </div>
    </div>
</body>

</html>
